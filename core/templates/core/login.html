<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login - AmbulanceIQ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body{background:linear-gradient(135deg,#1a237e,#1565c0);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:30px}
.login-logo .icon{width:70px;height:70px;background:#1a237e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:#fff;margin:0 auto 12px}
.form-control{border-radius:10px;padding:12px 16px;border:2px solid #e8eaf0}
.form-control:focus{border-color:#1a237e;box-shadow:none}
.btn-login{background:#1a237e;color:#fff;border-radius:10px;padding:12px;font-weight:600;width:100%;border:none}
.btn-login:hover{background:#283593;color:#fff}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <div class="icon"><i class="fas fa-ambulance"></i></div>
    <h4 class="fw-bold">AmbulanceIQ</h4>
    <p class="text-muted small">Optimal Ambulance Positioning System</p>
  </div>
  {% if form.errors %}
  <div class="alert alert-danger small">Invalid username or password.</div>
  {% endif %}
  <form method="post">{% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-semibold">Username</label>
      <input type="text" name="username" class="form-control" placeholder="Enter username" required>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Enter password" required>
    </div>
    <button type="submit" class="btn btn-login mb-3"><i class="fas fa-sign-in-alt me-2"></i>Login</button>
    <p class="text-center text-muted small">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
    <p class="text-center text-muted small"><a href="/" class="text-muted">← Back to Home</a></p>
  </form>
</div>
</body>
</html>
