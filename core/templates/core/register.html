<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register - AmbulanceIQ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body{background:linear-gradient(135deg,#1a237e,#1565c0);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{border-radius:20px;padding:40px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.form-control{border-radius:10px;padding:12px 16px;border:2px solid #e8eaf0}
.form-control:focus{border-color:#1a237e;box-shadow:none}
.errorlist{color:#e53935;font-size:0.8rem;list-style:none;padding:0}
</style>
</head>
<body>
<div class="card border-0">
  <div class="text-center mb-4">
    <div style="width:60px;height:60px;background:#1a237e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;margin:0 auto 12px"><i class="fas fa-user-plus"></i></div>
    <h4 class="fw-bold">Create Account</h4>
    <p class="text-muted small">AmbulanceIQ - Optimal Positioning System</p>
  </div>
  <form method="post">{% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
      <label class="form-label fw-semibold">{{ field.label }}</label>
      <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
             class="form-control" placeholder="{{ field.label }}"
             {% if field.field.required %}required{% endif %}>
      {% if field.errors %}<ul class="errorlist">{% for e in field.errors %}<li>{{ e }}</li>{% endfor %}</ul>{% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn w-100 fw-bold" style="background:#1a237e;color:#fff;border-radius:10px;padding:12px">
      <i class="fas fa-user-plus me-2"></i>Create Account
    </button>
    <p class="text-center text-muted small mt-3">Already have an account? <a href="{% url 'login' %}">Login</a></p>
  </form>
</div>
</body>
</html>
